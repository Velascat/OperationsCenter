# Repo Graph (ER-001) — canonical repo identity + minimal edge vocabulary.
#
# Authoritative source for legacy→canonical name resolution and impact
# queries used by OperationsCenter planning + SwitchBoard lane decisions.
#
# v1 edge vocabulary:
#   depends_on_contracts_from   (consumer → contract repo)
#   dispatches_to               (caller → orchestrator)
#   routes_through              (orchestrator → router/lane selector)
#
# Add new edge types only when a real query needs them.

repos:

  operator_console:
    canonical_name: OperatorConsole
    legacy_names: [FOB]
    github_url: https://github.com/Velascat/OperatorConsole
    runtime_role: operator_cli

  operations_center:
    canonical_name: OperationsCenter
    legacy_names: [ControlPlane]
    github_url: https://github.com/Velascat/OperationsCenter
    runtime_role: orchestration

  switchboard:
    canonical_name: SwitchBoard
    legacy_names: []
    github_url: https://github.com/Velascat/SwitchBoard
    runtime_role: lane_selection

  workstation:
    canonical_name: WorkStation
    legacy_names: []
    github_url: https://github.com/Velascat/WorkStation
    runtime_role: local_runtime

  cxrp:
    canonical_name: CxRP
    legacy_names: [ExecutionContractProtocol]
    github_url: https://github.com/Velascat/CxRP
    runtime_role: contracts

  rxp:
    canonical_name: RxP
    legacy_names: []
    github_url: https://github.com/Velascat/RxP
    runtime_role: contracts

  executor_runtime:
    canonical_name: ExecutorRuntime
    legacy_names: []
    github_url: https://github.com/Velascat/ExecutorRuntime
    runtime_role: runtime_dispatch

  source_registry:
    canonical_name: SourceRegistry
    legacy_names: []
    github_url: https://github.com/Velascat/SourceRegistry
    runtime_role: fork_management

  videofoundry:
    canonical_name: VideoFoundry
    legacy_names: []
    github_url: https://github.com/Velascat/VideoFoundry
    runtime_role: managed_repo

  warehouse:
    canonical_name: Warehouse
    legacy_names: []
    github_url: https://github.com/Velascat/Warehouse
    runtime_role: managed_repo

edges:

  # OperatorConsole dispatches into OperationsCenter
  - {from: OperatorConsole, to: OperationsCenter, type: dispatches_to}

  # OperationsCenter routes through SwitchBoard for lane decisions
  - {from: OperationsCenter, to: SwitchBoard, type: routes_through}

  # Contract dependencies on CxRP
  - {from: OperationsCenter, to: CxRP, type: depends_on_contracts_from}
  - {from: SwitchBoard,      to: CxRP, type: depends_on_contracts_from}
  - {from: OperatorConsole,  to: CxRP, type: depends_on_contracts_from}

  # Contract dependencies on RxP — runtime invocation/result shape.
  # Verified via grep: OC backends import rxp.contracts; ExecutorRuntime
  # mirrors RxP types in its own contracts module.
  - {from: OperationsCenter, to: RxP, type: depends_on_contracts_from}
  - {from: ExecutorRuntime,  to: RxP, type: depends_on_contracts_from}

  # OperationsCenter dispatches to ExecutorRuntime for actual runtime
  # execution and to SourceRegistry for fork-management commands.
  - {from: OperationsCenter, to: ExecutorRuntime, type: dispatches_to}
  - {from: OperationsCenter, to: SourceRegistry,  type: dispatches_to}

# OperationsCenter — Managed Repo Contract: VideoFoundry
#
# This file defines how OperationsCenter interacts with VideoFoundry.
# It is a configuration contract, not an implementation.
#
# Boundary rule (enforced by policy, not by this file):
#   OperationsCenter may invoke VideoFoundry commands.
#   OperationsCenter may read files produced by VideoFoundry.
#   OperationsCenter must NEVER import VideoFoundry modules.
#   OperationsCenter must NEVER depend on VideoFoundry Python internals.
#
# Phase: 1 — Managed Repo Contract
# Phase 0 ground truth: docs/architecture/videofoundry_audit_ground_truth.md

repo_id: videofoundry
repo_name: VideoFoundry
repo_root: ../VideoFoundry          # relative to OperationsCenter repo root

# ---------------------------------------------------------------------------
# Run ID injection
# ---------------------------------------------------------------------------
# OperationsCenter is the source of truth for run_id.
# VideoFoundry uses AUDIT_RUN_ID when present; local/dev fallback exists
# but OpsCenter must not depend on it.
#
# OpsCenter responsibility:
#   1. Generate run_id (UUID hex, no dashes) before invocation.
#   2. Set AUDIT_RUN_ID in the audit process environment.
#   3. Record run_id for output discovery after completion.
run_id:
  source: operations_center
  env_var: AUDIT_RUN_ID
  format: uuid_hex                  # uuid4().hex — 32 hex chars, no dashes
  required_for_managed_runs: true

# ---------------------------------------------------------------------------
# Capabilities
# ---------------------------------------------------------------------------
capabilities:
  - audit

# ---------------------------------------------------------------------------
# Audit capability
# ---------------------------------------------------------------------------
audit:
  # Output discovery chain (planned — not yet implemented):
  #
  #   OpsCenter reads:  {bucket_dir}/run_status.json
  #     → field:        artifact_manifest_path
  #     → reads:        {artifact_manifest_path}
  #
  # artifact_manifest_path does NOT exist in run_status.json today.
  # This discovery chain requires Phase 2 (schema) + Phase 5 (VF implementation).
  #
  # Until Phase 2+5 are complete, OpsCenter must not attempt manifest discovery.
  output_discovery:
    entry_point: run_status.json
    chain:
      - file: run_status.json
        field: artifact_manifest_path
        status: planned               # artifact_manifest_path does not exist yet
        phase_required: "2+5"
      - file: artifact_manifest.json
        status: not_yet_available
        phase_required: "2+5"
    notes: >
      Phase 0 confirmed: run_status.json exists for all audit types (written by
      prepare_audit_bucket). artifact_manifest_path field is absent from current
      run_status.json. Do not scan directories to discover artifacts — wait for
      Phase 2 contract + Phase 5 VideoFoundry implementation.

  # Bucket directory naming convention (from Phase 0 ground truth):
  #   {channel_slug}_{YYYYMMDD}_{HHMMSS}_{run_id_hex}
  # Example: Connective_Contours_20260426_153453_3dead998d4c44e1cb296bef061de50f3
  bucket_naming: "{channel_slug}_{YYYYMMDD}_{HHMMSS}_{run_id_hex}"

  # ---------------------------------------------------------------------------
  # Audit types
  # ---------------------------------------------------------------------------
  # For each type:
  #   command       — external shell command OpsCenter invokes (no Python import)
  #   working_dir   — directory the command runs from (relative to repo_root)
  #   env_injected  — env vars OpsCenter must set before invocation
  #   output_dir    — where the per-run bucket appears (relative to repo_root)
  #   status_file   — location of run_status.json inside the bucket
  #   run_status_finalization — whether this type writes a final status today
  #   notes         — Phase 0 evidence and known gaps
  #
  # command_status values:
  #   verified       — command confirmed from Phase 0 source inspection
  #   not_yet_run    — command exists in source but no real run was available
  # ---------------------------------------------------------------------------
  audit_types:

    - audit_type: representative
      command: python -m tools.audit.run_representative_audit
      command_status: verified
      working_dir: .                  # repo root
      env_injected:
        - AUDIT_RUN_ID                # run identity — generated by OpsCenter
      output_dir: tools/audit/report/representative
      status_file: "{output_dir}/{bucket}/run_status.json"
      run_status_finalization: true   # has _RunStatusFinalizer — writes complete/failed
      phases_from_source:
        - bootstrap
        - authoring
        - rendering
        - pre_delivery_voice_over_gate
        - pre_delivery_text_render_gate
        - delivery
        - post_run_audit
      status_values: [in_progress, complete, failed]
      evidence: one_run_inspected_in_progress
      notes: >
        Phase 0: one real run exists (Connective_Contours_20260426_153453_...).
        Run was in_progress at rendering phase (interrupted). Authoring artifacts
        confirmed present. Rendering/delivery artifacts absent. run_status.json
        confirmed written incrementally by _RunStatusFinalizer.

    - audit_type: enrichment
      command: python -m tools.audit.run_enrichment_audit
      command_status: not_yet_run
      working_dir: .
      env_injected:
        - AUDIT_RUN_ID
      output_dir: tools/audit/report/enrichment
      status_file: "{output_dir}/{bucket}/run_status.json"
      run_status_finalization: false  # prepare_audit_bucket only — never writes final status
      status_values: [in_progress]    # only value ever written
      evidence: source_inspected_no_run
      notes: >
        Phase 0: no enrichment runs exist. Command confirmed in source. Uses
        prepare_audit_bucket (writes initial in_progress) but no finalization
        logic. run_status.json will be stuck at in_progress after completion
        or failure until Phase 5 adds finalization.

    - audit_type: ideation
      command: python -m tools.audit.run_ideation_audit
      command_status: not_yet_run
      working_dir: .
      env_injected:
        - AUDIT_RUN_ID
      output_dir: tools/audit/report/ideation
      status_file: "{output_dir}/{bucket}/run_status.json"
      run_status_finalization: false
      status_values: [in_progress]
      evidence: source_inspected_no_run
      notes: >
        Phase 0: no ideation runs exist. Same finalization gap as enrichment.

    - audit_type: render
      command: python -m tools.audit.run_render_audit
      command_status: not_yet_run
      working_dir: .
      env_injected:
        - AUDIT_RUN_ID
      output_dir: tools/audit/report/render
      status_file: "{output_dir}/{bucket}/run_status.json"
      run_status_finalization: false
      status_values: [in_progress]
      evidence: source_inspected_no_run
      notes: >
        Phase 0: no render runs exist. Same finalization gap as enrichment.

    - audit_type: segmentation
      command: python -m tools.audit.run_segmentation_audit
      command_status: not_yet_run
      working_dir: .
      env_injected:
        - AUDIT_RUN_ID
      output_dir: tools/audit/report/segmentation
      status_file: "{output_dir}/{bucket}/run_status.json"
      run_status_finalization: false
      status_values: [in_progress]
      evidence: source_inspected_no_run
      notes: >
        Phase 0: no segmentation runs exist. Same finalization gap as enrichment.

    - audit_type: stack_authoring
      command: python -m tools.audit.run_stack_authoring_audit
      command_status: not_yet_run
      working_dir: .
      env_injected:
        - AUDIT_RUN_ID
      output_dir: tools/audit/report/authoring   # NOTE: directory name is "authoring", not "stack_authoring"
      status_file: "{output_dir}/{bucket}/run_status.json"
      run_status_finalization: false
      status_values: [in_progress]
      evidence: source_inspected_no_run
      notes: >
        Phase 0: no stack_authoring runs exist. Output directory is
        tools/audit/report/authoring (not stack_authoring) — naming mismatch
        between CLI name and directory name. Same finalization gap as enrichment.

# ---------------------------------------------------------------------------
# Path layout (descriptive — not final Phase 2 vocabulary)
# ---------------------------------------------------------------------------
# From Phase 0 ground truth. Do not use as manifest schema — Phase 2 defines that.
path_layout:
  run_root: >
    Files at the top level of the bucket directory.
    Most authoring-phase artifacts land here.
  artifacts_subdir: >
    Files under artifacts/ subdirectory inside the bucket.
    Known subdirs: artifacts/authoring/, artifacts/script_contract/ScriptWriting/
  named_subdir: >
    Files under a named subdirectory at the bucket level (not under artifacts/).
    Known subdirs: audit/, text_overlay/
  repo_singleton: >
    Fixed path outside any per-run bucket. Overwritten in-place on each run.
    No run_id in path. Example: tools/audit/report/architecture_invariants/latest.json
  auxiliary_or_noise: >
    Infrastructure files that appear in buckets but are not audit artifacts.
    Examples: coverage.ini, .coverage.*, sitecustomize.py, __pycache__/

# ---------------------------------------------------------------------------
# Boundary policy
# ---------------------------------------------------------------------------
boundary:
  allowed:
    - invoke VideoFoundry commands via subprocess
    - read files produced by VideoFoundry (run_status.json, artifact_manifest.json)
    - set environment variables for VideoFoundry processes (AUDIT_RUN_ID)
  forbidden:
    - import any VideoFoundry Python module
    - depend on VideoFoundry Python package internals
    - scan arbitrary directories to discover artifacts (use run_status.json chain only)
    - read VideoFoundry source code at runtime
    - call VideoFoundry functions directly

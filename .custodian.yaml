repo_key: OperationsCenter
src_root: src/operations_center
tests_root: tests

audit:
  # C1/C6 (TODO/FIXME markers): exclude paths where TODO/FIXME appear as
  # strings being analysed (todo_signal, todo_accumulation, artifact_writer)
  # or in comments already tagged [deferred, reviewed] and covered by OC2.
  # C2 (print statements): entrypoints are CLI tools that write to stdout
  # deliberately; two library files have print() only in docstring examples.
  exclude_paths:
    C1:
      - src/operations_center/observer/collectors/todo_signal.py
      - src/operations_center/observer/artifact_writer.py
      - src/operations_center/decision/rules/todo_accumulation.py
      - src/operations_center/proposer/candidate_mapper.py
      - src/operations_center/observer/collectors/validation_history.py
      - src/operations_center/tuning/metrics.py
      - src/operations_center/insights/derivers/quality_trend.py
    C6:
      - src/operations_center/observer/collectors/todo_signal.py
      - src/operations_center/decision/rules/todo_accumulation.py
      - src/operations_center/proposer/candidate_mapper.py
      - src/operations_center/insights/derivers/quality_trend.py
    C2:
      - src/operations_center/entrypoints/**
      - src/operations_center/execution/campaign_store.py
      - src/operations_center/tuning/calibration.py
    C4:
      # Entrypoints are polling workers — pass-in-except is correct in loops
      # where a single bad item must not abort the whole work cycle.
      - src/operations_center/entrypoints/**
      # Library files with pass-in-except that is intentional:
      # adapters: subprocess/git cleanup, process kill, PR metadata parsing
      - src/operations_center/adapters/git/client.py
      - src/operations_center/adapters/github_pr.py
      - src/operations_center/adapters/kodo/adapter.py
      # backends: finally-block cleanup (temp file delete, process teardown)
      - src/operations_center/backends/aider_local/adapter.py
      - src/operations_center/backends/kodo/invoke.py
      # governance/audit: state load failure → None is documented fallback
      - src/operations_center/audit_governance/runner.py
      # store: corrupted state file → empty dict (already logs warning)
      - src/operations_center/execution/usage_store.py
      # analytics/observer: malformed records in scan loops are skipped
      - src/operations_center/insights/derivers/execution_outcome.py
      - src/operations_center/insights/derivers/noop_loop.py
      - src/operations_center/observer/collectors/check_signal.py
      - src/operations_center/observer/collectors/execution_health.py
      - src/operations_center/observer/collectors/validation_history.py
      # priority scoring: malformed timestamp/label → default score (correct)
      - src/operations_center/priority_scans.py
      # proposer: config value parse failure → skip constraint (correct)
      - src/operations_center/proposer/guardrail_adapter.py
      # scheduled tasks: datetime parse failure → treat as never run (correct)
      - src/operations_center/scheduled_tasks/runner.py
      # spec director: date parse on archival, state file load
      - src/operations_center/spec_director/spec_writer.py
      - src/operations_center/spec_director/state.py
      # tuning: calibration/metrics/compare calculations — one bad record skipped
      - src/operations_center/tuning/calibration.py
      - src/operations_center/tuning/compare.py
      - src/operations_center/tuning/metrics.py
      # fixture harvesting: file write failure on best-effort copy
      - src/operations_center/fixture_harvesting/writer.py
      # mini regression: test-run failure in analysis loop
      - src/operations_center/mini_regression/runner.py
      # proposer: integration step failure — skip candidate
      - src/operations_center/proposer/candidate_integration.py
      # audit dispatch: process cleanup (SIGTERM fallback)
      - src/operations_center/audit_dispatch/executor.py
      # behavior calibration: unresolvable artifact path — skip rule
      - src/operations_center/behavior_calibration/rules.py
      # spec director phase orchestrator: one best-effort traceability append
      - src/operations_center/spec_director/phase_orchestrator.py
    C9:
      # Entrypoints are polling workers (same rationale as C4); broad catches
      # prevent one bad work item from aborting the whole cycle. The cycle logs
      # aggregate outcomes via artifact files, not per-exception logger calls.
      - src/operations_center/entrypoints/**
      # Analytics / signal collection — one bad record or failing collector must
      # not crash the analysis pass. Errors surface in artifact-level counts.
      - src/operations_center/insights/derivers/**
      - src/operations_center/observer/collectors/**
      - src/operations_center/observer/service.py  # _collect_required re-raises; _collect_optional now logs
      - src/operations_center/tuning/**
      # Backend normalisers: parse best-effort; return None/[] on any decode failure
      - src/operations_center/backends/**
      # Adapter layer: GitHub/kodo API calls return [] / None on any transport error;
      # callers decide whether to retry or skip.
      - src/operations_center/adapters/github_pr.py
      - src/operations_center/adapters/kodo/adapter.py
      # Structured error capture — exception message stored in a result/error list,
      # not silently discarded:
      - src/operations_center/audit_dispatch/executor.py
      - src/operations_center/proposer/backlog_promoter.py
      - src/operations_center/proposer/candidate_integration.py
      - src/operations_center/behavior_calibration/rules.py
      # Best-effort / non-fatal defensive fallbacks (documented per-file):
      - src/operations_center/audit_governance/runner.py  # budget/cooldown state now logs warnings
      - src/operations_center/autonomy_tiers/config.py
      - src/operations_center/config/drift.py
      - src/operations_center/execution/validation.py
      - src/operations_center/execution/workspace.py
      - src/operations_center/insights/loader.py
      - src/operations_center/mini_regression/runner.py
      - src/operations_center/post_merge_regression.py
      - src/operations_center/priority_scans.py
      - src/operations_center/reconcile_running.py
      - src/operations_center/scheduled_tasks/runner.py
      - src/operations_center/spec_director/context_bundle.py
      - src/operations_center/spec_director/phase_orchestrator.py
      - src/operations_center/spec_director/recovery.py
      - src/operations_center/spec_director/spec_writer.py
    C29:
      # Entrypoint main files are necessarily large — they wire together the full
      # worker lifecycle (arg parsing, signal handling, retry loops, artifact
      # writes). Splitting them would fragment cohesion without adding clarity.
      - src/operations_center/entrypoints/board_worker/main.py
      - src/operations_center/entrypoints/setup/main.py
      - src/operations_center/entrypoints/autonomy_cycle/main.py
      - src/operations_center/entrypoints/pr_review_watcher/main.py
      # usage_store: one file, one responsibility — tracks token/cost usage with
      # many storage/query/aggregation methods. A clean boundary, not monolithic.
      - src/operations_center/execution/usage_store.py
      # policy engine: declarative rule evaluation over many rule types — each
      # rule type needs its own evaluation method; cannot reasonably be split.
      - src/operations_center/policy/engine.py
    C11:
      # Agent-spawning entrypoints: board_worker, intake, pr_review_watcher invoke
      # the coding backend (kodo, aider, etc.) which runs for an unbounded duration.
      # A timeout would kill legitimate long-running tasks.
      - src/operations_center/entrypoints/board_worker/**
      - src/operations_center/entrypoints/intake/**
      - src/operations_center/entrypoints/pr_review_watcher/**
      # Interactive setup scripts run once by a human operator; timeouts would
      # interrupt interactive login flows and package installation.
      - src/operations_center/entrypoints/setup/**
      # Workspace bootstrap runs pip/npm install for repo setup — can take minutes.
      - src/operations_center/adapters/workspace/bootstrap.py
    C23:
      # shell=True is intentional in OC's orchestration layer — all commands come
      # from trusted YAML config (not user input) and may use shell features like
      # && chaining. Injection risk is acceptable given the trusted source.
      - src/operations_center/application/validation.py
      - src/operations_center/execution/workspace.py
      - src/operations_center/execution/baseline_validation.py
      - src/operations_center/adapters/workspace/bootstrap.py
      - src/operations_center/entrypoints/setup/main.py
      # shell=True in docstring "Never uses shell=True." — regex false positive
      - src/operations_center/audit_dispatch/executor.py
      # install_provider() runs npm/curl install commands from trusted YAML config
      - src/operations_center/entrypoints/setup/providers.py

  # Stale handler names cited in autonomy_gaps.md from a pre-board_worker
  # architecture. Used by Custodian's generic C8 (and OC's OC8) to skip
  # tokens that are documented architecture drift, not unimplemented features.
  stale_handlers:
    - handle_goal_task
    - handle_test_task
    - handle_improve_task
    - handle_propose_cycle
    - handle_blocked_triage
    - handle_feedback_loop_scan
    - handle_merge_conflict_scan
    - handle_review_revision_scan
    - handle_stale_pr_scan
    - handle_workspace_health_check
    - handle_dependency_update_scan
    - handle_stale_autonomy_task_scan
    - run_watch_loop
    - run_parallel_watch_loop
    - classify_execution_result
    - select_watch_candidate
    - build_proposal_candidates
    - validate_task_pre_execution
    - _process_human_review


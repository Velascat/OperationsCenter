    - flaky_test
    - coverage_gap
    - snapshots_analyzed
    - lint_fix
    - type_fix
    - github_rate_limit_low
    - kodo_quota_event
    - kodo_quality_warning
    - failure_rate_degradation
    - warn_threshold
    - block_threshold
    - cooldown_seconds
    - stale_pr_days

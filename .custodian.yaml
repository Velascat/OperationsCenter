  # F3-exempt field names: schema/documentation fields never accessed by dot
  # notation because they're serialized to JSON and consumed by external readers,
  # or are compatibility fields retained for schema stability.
  f3_exempt:
    - bucket_naming_note
    - bucket_naming_pattern
    - contract_version
    - evidence_id
    - ref_id
    - workdir_name

  # Plugin-defined audit config keys — suppresses unknown-key warnings in doctor.
  plugin_audit_keys:
    - known_values
    - oc1_exempt
    - oc7_exempt

  # Additional well-known string values for OC9 to recognise without
  # requiring a string-literal anchor in src/.
  known_values:
    - awaiting_input
    - in_progress
    - test_campaign
    - improve_campaign
    - execute_representative_workflow
    - requires_human_approval

  # OC1 backends that have raise NotImplementedError intentionally —
  # openclaw and archon are partially scaffolded; full implementation is deferred.
  oc1_exempt:
    - src/operations_center/backends/openclaw/invoke.py
    - src/operations_center/backends/archon/invoke.py

  # Settings fields that are intentionally kept even though OC7 can't find
  # dot-notation usage. These are generated into config file templates by
  # setup/main.py (as dict keys) and must remain in the schema so user
  # configs load without validation errors.
  oc7_exempt:
    - push_on_validation_failure
    - sign_commits
    - signing_key
    - switchboard_url

architecture:
  layers:
    # General DDD boundary rules
    - name: domain
      glob: "src/operations_center/domain/**"
      may_not_import:
        - "src/operations_center/adapters/**"
        - "src/operations_center/backends/**"
        - "src/operations_center/entrypoints/**"
    - name: contracts
      glob: "src/operations_center/contracts/**"
      may_not_import:
        - "src/operations_center/adapters/**"
        - "src/operations_center/backends/**"
        - "src/operations_center/entrypoints/**"
    - name: backends
      glob: "src/operations_center/backends/**"
      may_not_import:
        - "src/operations_center/entrypoints/**"
        - "src/operations_center/adapters/**"
    - name: adapters
      glob: "src/operations_center/adapters/**"
      may_not_import:
        - "src/operations_center/entrypoints/**"
        - "src/operations_center/backends/**"
    # AI2: fast-feedback ladder — unidirectional import graph
    - name: slice_replay
      glob: "src/operations_center/slice_replay/**"
      may_not_import:
        - "src/operations_center/audit_dispatch/**"
        - "src/operations_center/audit_governance/**"
        - "src/operations_center/mini_regression/**"
    - name: mini_regression
      glob: "src/operations_center/mini_regression/**"
      may_not_import:
        - "src/operations_center/audit_dispatch/**"
        - "src/operations_center/audit_governance/**"
    - name: fixture_harvesting
      glob: "src/operations_center/fixture_harvesting/**"
      may_not_import:
        - "src/operations_center/audit_dispatch/**"
    - name: audit_governance
      glob: "src/operations_center/audit_governance/**"
      may_not_import:
        - "src/operations_center/fixture_harvesting/**"
        - "src/operations_center/slice_replay/**"
        - "src/operations_center/mini_regression/**"
  invariants:
    # AI1: src/operations_center must not import managed-repo packages
    - name: "AI1 managed-repo import (videofoundry)"
      glob: "src/operations_center/**"
      forbidden_import_prefix: "videofoundry"
    - name: "AI1 managed-repo import (tools.audit)"
      glob: "src/operations_center/**"
      forbidden_import_prefix: "tools.audit"
    - name: "AI1 managed-repo import (managed_repo)"
      glob: "src/operations_center/**"
      forbidden_import_prefix: "managed_repo"

plugins:
  - module: _custodian.log_scanner:OCLogScanner
  - module: _custodian.state_scanner:OCStateScanner

detectors:
  - module: _custodian.detectors:build_oc_detectors
  - module: _custodian.architecture:build_oc_architecture_detectors
  - module: _custodian.doc_conventions:build_oc_doc_convention_detectors

maintenance:
  stale_pr_days: 7
  stale_state_days: 90

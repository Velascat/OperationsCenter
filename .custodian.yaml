repo_key: OperationsCenter
src_root: src/operations_center
tests_root: tests

audit:
  # Stale handler names cited in autonomy_gaps.md from a pre-board_worker
  # architecture. Used by Custodian's generic C8 (and OC's OC8) to skip
  # tokens that are documented architecture drift, not unimplemented features.
  stale_handlers:
    - handle_goal_task
    - handle_test_task
    - handle_improve_task
    - handle_propose_cycle
    - handle_blocked_triage
    - handle_feedback_loop_scan
    - handle_merge_conflict_scan
    - handle_review_revision_scan
    - handle_stale_pr_scan
    - handle_workspace_health_check
    - handle_dependency_update_scan
    - handle_stale_autonomy_task_scan
    - run_watch_loop
    - run_parallel_watch_loop
    - classify_execution_result
    - select_watch_candidate
    - build_proposal_candidates
    - validate_task_pre_execution
    - _process_human_review

  # Generic English / config / parameter words that appear backtick'd in
  # docs but aren't function names. Reduces C8 false positives.
  common_words:
    - cycles
    - effort
    - timeout
    - exchanges
    - execution
    - feedback
    - redesign
    - overhaul
    - modernize
    - context_limit
    - validation_failure
    - advice
    - execution_outcome
    - execution_cost
    - duration_anomaly
    - scope_violation
    - policy_violations
    - allowed_paths
    - context_handoff
    - flaky_test
    - coverage_gap
    - snapshots_analyzed
    - lint_fix
    - type_fix
    - github_rate_limit_low
    - kodo_quota_event
    - kodo_quality_warning
    - failure_rate_degradation
    - warn_threshold
    - block_threshold
    - cooldown_seconds
    - stale_pr_days
    - disk_space_low
    - insufficient_quota
    - execution_stderr_excerpt
    - _kodo_version_cache
    - _rejection_store
    - candidate_dedup_key
    - _path_locks
    - _consecutive_errors
    - blocked_triage
    - self_healing_repeated_block
    - skip_repo_budget
    - circuit_breaker_escalation_sent
    - board_health_check
    - validate_credentials
    - execution_gate_decision
    - build_proposal_description
    - _load_rejection_patterns_for_proposal
    - create_proposed_task_if_missing
    - _semantic_title_similarity
    - _estimate_task_complexity
    - pull_request_url
    - repo_key
    - write_text
    - start_watch_role
    - refactor
    - migrate
    - restructure
    - rewrite
    - lint_cluster
    - type_cluster
    - snapshot_appearances
    - expanded
    - expanding
    - superseded
    - escalated
    - archived
    - ci_green
    - evidence_schema_version
    - completed
    - failure_limitation_present
    - improve_campaign
    - test_campaign
    - cleanup_state
    - recover_stale
    - ghost_audit
    - flow_audit
    - code_health_audit

  # Additional well-known string values for OC9 to recognise without
  # requiring a string-literal anchor in src/.
  known_values:
    - awaiting_input
    - in_progress
    - test_campaign
    - improve_campaign

plugins:
  - module: _custodian.log_scanner:OCLogScanner
  - module: _custodian.state_scanner:OCStateScanner

detectors:
  - module: _custodian.detectors:build_oc_detectors

maintenance:
  stale_pr_days: 7
  stale_state_days: 90

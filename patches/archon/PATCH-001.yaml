notes: |
  Adds optional `provider` / `model` fields to `runWorkflowBodySchema`. Route
  handler reads them and threads through `HandleMessageContext.runtimeOverride`
  (new readonly field). orchestrator-agent's `dispatchOrchestratorWorkflow` and
  `handleWorkflowRunCommand` accept the override and apply it by mutating the
  in-memory workflow object's `provider`/`model` before any executeWorkflow call.
  The mutation is safe — the workflow object is freshly loaded per-run and
  discarded after dispatch (does not persist back to the YAML on disk).

  When set, override takes precedence over `workflow.provider` / `workflow.model`
  in the executor's resolution chain (see executor.ts `resolvedProvider`/`resolvedModel`).

  Backward compatible: stock dispatch paths (CLI / Slack / Telegram / GitHub /
  Discord) never set runtimeOverride, so they continue to behave unchanged.

  Live-validated 2026-05-07 against built-from-source container:
  - schema accepts {provider, model} fields
  - 71 bun tests pass (3 new in api.workflow-runs.test.ts)
  - cmd.workflow_starting fires on dispatch (override path reached)
  - actual workflow.runtime_override_applied log can only be observed with a
    registered codebase (no codebase → bail before workflow execute)

  Why fork rather than upstream-first: per Dave's "managed forks first" pattern
  (SourceRegistry: "Adapters first; fork when invariants can't be enforced
  externally"). The OC integration needed this channel to ship; we apply the
  fix on the Velascat/Archon fork now and file an upstream PR later when the
  integration has matured enough to advocate for the API change.


    - is_quota_exhausted
    - visibility
    # ADR 0002 backend card axis vocabulary (orchestration / mechanism labels).
    - local_subprocess
    - single_agent

  # F3-exempt field names: schema/documentation fields never accessed by dot
  # notation because they're serialized to JSON and consumed by external readers,
  # or are compatibility fields retained for schema stability.
  f3_exempt:
    - bucket_naming_note
    - bucket_naming_pattern
    - contract_version
    - evidence_id
    - ref_id
    - workdir_name

  # Plugin-defined audit config keys — suppresses unknown-key warnings in doctor.
  plugin_audit_keys:
    - known_values
    - oc1_exempt
    - oc7_exempt

  # Additional well-known string values for OC9 to recognise without
  # requiring a string-literal anchor in src/.
  known_values:
    - awaiting_input
    - in_progress
    - test_campaign
    - improve_campaign
    - execute_representative_workflow
    - audit_report
    - kodo_version
    - requires_human_approval

  # OC1 backends that have raise NotImplementedError intentionally —
  # openclaw and archon are partially scaffolded; full implementation is deferred.
  oc1_exempt:
    - src/operations_center/backends/openclaw/invoke.py
    - src/operations_center/backends/archon/invoke.py

  # Settings fields that are intentionally kept even though OC7 can't find
  # dot-notation usage. These are generated into config file templates by
  # setup/main.py (as dict keys) and must remain in the schema so user
  # configs load without validation errors.
  oc7_exempt:
    - push_on_validation_failure
    - sign_commits
    - signing_key
    - switchboard_url

architecture:
  layers:
    # General DDD boundary rules
    - name: domain
      glob: "src/operations_center/domain/**"
      may_not_import:
        - "src/operations_center/adapters/**"
        - "src/operations_center/backends/**"
        - "src/operations_center/entrypoints/**"
    - name: contracts
      glob: "src/operations_center/contracts/**"
      may_not_import:
        - "src/operations_center/adapters/**"
        - "src/operations_center/backends/**"
        - "src/operations_center/entrypoints/**"
    - name: backends
      glob: "src/operations_center/backends/**"
      may_not_import:
        - "src/operations_center/entrypoints/**"
        - "src/operations_center/adapters/**"
    - name: adapters
      glob: "src/operations_center/adapters/**"
      may_not_import:
        - "src/operations_center/entrypoints/**"
        - "src/operations_center/backends/**"
    # AI2: fast-feedback ladder — unidirectional import graph
    - name: slice_replay
      glob: "src/operations_center/slice_replay/**"
      may_not_import:
        - "src/operations_center/audit_dispatch/**"
        - "src/operations_center/audit_governance/**"
        - "src/operations_center/mini_regression/**"
    - name: mini_regression
      glob: "src/operations_center/mini_regression/**"
      may_not_import:
        - "src/operations_center/audit_dispatch/**"
        - "src/operations_center/audit_governance/**"
    - name: fixture_harvesting
      glob: "src/operations_center/fixture_harvesting/**"
      may_not_import:
        - "src/operations_center/audit_dispatch/**"
    - name: audit_governance
      glob: "src/operations_center/audit_governance/**"
      may_not_import:
        - "src/operations_center/fixture_harvesting/**"
        - "src/operations_center/slice_replay/**"
        - "src/operations_center/mini_regression/**"
  invariants:
    # AI1: src/operations_center must not import managed-repo packages.
    # The bound managed repo's package prefix lives in the private overlay
    # config/managed_repos/local/<repo_id>.yaml — Custodian config is
    # public, so the rule here uses placeholder prefixes only. Operators
    # extend this list in their private overlay's `.custodian/config.yaml`
    # at the consuming repo.
    - name: "AI1 managed-repo import (tools.audit)"
      glob: "src/operations_center/**"
      forbidden_import_prefix: "tools.audit"
    - name: "AI1 managed-repo import (managed_repo)"
      glob: "src/operations_center/**"
      forbidden_import_prefix: "managed_repo"

    # AI5: boundary discipline for extracted-library platform deps.
    # OC consumes ExecutorRuntime, RxP, SourceRegistry as independent
    # libraries — imports must go through each library's public API
    # only. Deep imports bypass the contract.
    - name: "AI5 ExecutorRuntime public API only"
      glob: "src/operations_center/**"
      public_api_only:
        package: "executor_runtime"
        allowed_paths:
          - "executor_runtime"
          - "executor_runtime.runners"
          - "executor_runtime.contracts"
    - name: "AI5 RxP public API only"
      glob: "src/operations_center/**"
      public_api_only:
        package: "rxp"
        allowed_paths:
          - "rxp.contracts"
          - "rxp.vocabulary"
    - name: "AI5 SourceRegistry public API only"
      glob: "src/operations_center/**"
      public_api_only:
        package: "source_registry"
        allowed_paths:
          - "source_registry"

plugins:
  - module: ".custodian/log_scanner.py:OCLogScanner"
  - module: ".custodian/state_scanner.py:OCStateScanner"

detectors:
  - module: ".custodian/detectors.py:build_oc_detectors"
  - module: ".custodian/architecture.py:build_oc_architecture_detectors"
  # DC1-DC5 doc-convention detectors moved to Custodian native (DC-class).
  # Configure via the top-level `doc_conventions:` block if defaults need
  # tuning; otherwise the natives just work.

maintenance:
  stale_pr_days: 7
  stale_state_days: 90

tools:
  ruff: true
  vulture: true
  # AI3 is now expressed as a Semgrep rule (no Python AST walker).
  # See .custodian/rules/semgrep/ai3_no_directory_scanning.yaml.
  semgrep:
    configs:
      - .custodian/rules/semgrep

# ---------------------------------------------------------------------------
# Privacy / boundary enforcement (Custodian B-class)
# ---------------------------------------------------------------------------
# OperationsCenter ships in a public repo. Managed repos it binds to may
# be private. Names listed here cause Custodian B1 to fail any tracked
# file that mentions them, with the noted path patterns excluded.
privacy:
  require_private_repo_name_source: true

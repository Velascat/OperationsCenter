forks:
  kodo:
    upstream:
      repo: ikamensh/kodo
      latest_known_release: 0.4.272
      latest_commit_sha: 90bdf8a
    fork:
      repo: Velascat/kodo
      branch: dev
    base_commit: 90bdf8a
    fork_commit: 9758a0a
    install:
      kind: cli_tool
      modes:
        prod: uv tool install --reinstall --force git+ssh://git@github.com/Velascat/kodo.git@{fork_commit}
        ci: uv tool install --reinstall --force git+https://github.com/Velascat/kodo.git@{fork_commit}
        dev: uv tool install --reinstall --force {local_clone}
      local_clone_hint: ~/Documents/GitHub/kodo
    poll_cadence_hours: 24
    auto_pr_push: true
  archon:
    upstream:
      repo: coleam00/Archon
    fork:
      repo: Velascat/Archon
      branch: main
    base_commit: 6be5c61
    fork_commit: fd6d75e
    install:
      kind: external
      modes:
        dev: 'true'
        ci: 'true'
        prod: 'true'
      local_clone_hint: ~/Documents/GitHub/Archon
    poll_cadence_hours: 24
    auto_pr_push: false
    auto_sync: true

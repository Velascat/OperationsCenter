# Phase 7 — contract gaps for the Kodo executor.
# Justification trail for any non-adapter_only verdict.

- id: G-001
  gap: "runtime selection lives in Kodo team config (e.g. _CLAUDE_FALLBACK_TEAM), not in OC RuntimeBinding"
  discovered_at: "2026-05-05"
  backend_version: "0.4.272"
  impact: "OC cannot bind RuntimeBinding per request; runtime is decided by which team config the adapter passes to Kodo"
  workaround: "executors/kodo/binder.py + KodoBackendAdapter wraps invocation, writes .kodo/team.json per call. CONFIRMED WORKING via real Kodo run 2026-05-05."
  fork_threshold: "if Kodo refuses to accept a per-invocation team override and config files cannot be templated per request"
  status: mitigated
  patch_deadline: null

- id: G-002
  gap: "Kodo binder doesn't derive the --orchestrator string from RuntimeBinding"
  discovered_at: "2026-05-05"
  backend_version: "0.4.272"
  impact: "When KodoSettings.orchestrator='claude' but RuntimeBinding=cli_subscription/opus, kodo expects ANTHROPIC_API_KEY because 'claude' selects API path. CLI backends need 'claude-code:opus' format. Discovered during the real R6 end-to-end test."
  workaround: "MITIGATED 2026-05-05: KodoTeamSelection now carries .orchestrator (derived via _orchestrator_for_cli). KodoBackendAdapter sets prepared.orchestrator_override; invoker passes a per-call profile to kodo.run. Verified by R6-retry-2 against real kodo 0.4.272."
  fork_threshold: "no fork needed — binder enhancement only"
  status: mitigated
  patch_deadline: null

- id: G-003
  gap: "Kodo normalizer trusts exit_code; misses internal stage failures"
  discovered_at: "2026-05-05"
  backend_version: "0.4.272"
  impact: "Real R6 run: kodo exit_code=0 even though 'Done: 0/1 stage completed; Stage crashed: ...' appeared in stdout. Normalizer reported success=True for what was actually a failed run."
  workaround: "MITIGATED 2026-05-05: backends/kodo/normalize.py now runs _scan_stdout_for_internal_failure(). Patterns catch 'Done: 0/N stage completed', 'Stage X crashed', 'crashed:', 'Stopping run'. Status flips to FAILED + failure_reason populated even when exit_code=0. Verified by R6-retry-2."
  fork_threshold: "no fork needed — normalizer enhancement only"
  status: mitigated
  patch_deadline: null

- id: G-004
  gap: "kodo 0.4.272 ClaudeCodeOrchestrator.cycle() rejects 'coach' kwarg"
  discovered_at: "2026-05-05"
  backend_version: "0.4.272"
  impact: "Internal Kodo bug crashes the orchestrator on the first cycle when using claude-code backend. OrchestratorBase.run() unconditionally passes coach=coach; ClaudeCodeOrchestrator.cycle() and KimiCodeOrchestrator.cycle() didn't accept it."
  workaround: "FORKED 2026-05-05: Velascat/kodo branch fix/coach-kwarg-orchestrator-subclasses adds coach=None to both subclasses + signature regression test (parallel to upstream PR #49 by syamai which sat unreviewed for 22+ days). Verified end-to-end via OC R7-fork run — TypeError gone, orchestrator runs through to Claude Code SDK. Install via: uv tool install --reinstall --force /home/dev/Documents/GitHub/kodo. Drop fork when ikamensh/kodo merges syamai's PR #49 or our fix."
  fork_threshold: "MET — upstream PR open with no review activity for 22+ days; ship-blocking for claude-code orchestrator path"
  status: forked
  patch_deadline: null
